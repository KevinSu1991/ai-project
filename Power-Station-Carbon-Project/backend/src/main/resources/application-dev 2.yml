spring:
  application:
    name: power-station-carbon-size

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/carbon_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: qwe21qwe
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Jackson 日期格式
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  # 实体扫描包
  type-aliases-package: com.sec.carbon.base.entity
  # Mapper XML 路径
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # 下划线转驼峰（数据库 user_name → Java userName）
    map-underscore-to-camel-case: true
    # SQL 日志
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 删

# JWT 配置
jwt:
  # JWT 签名密钥（生产环境请使用复杂密钥并妥善保管）
  secret: PowerStationCarbonSecretKey2024!@#SEC_NEED_CHANGE_IN_PROD
  # Token 有效期（秒），默认 24 小时
  expiration: 86400

# Knife4j API 文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docsicus

knife4j:
  enable: true
  setting:
    language: zh-CN鰭

# 服务端口
server:
  port: 8080
